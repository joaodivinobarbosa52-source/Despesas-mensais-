<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#534AB7"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Despesas"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>Despesas Mensais</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-mid:#AFA9EC;--purple-dark:#3C3489;
  --bg:#f8f8fb;--surface:#ffffff;--border:#e5e4f0;
  --text:#1a1a2e;--text2:#6b6a80;--text3:#a09fb5;
  --blue-bg:#E6F1FB;--blue-txt:#0C447C;
  --green-bg:#EAF3DE;--green-txt:#27500A;
  --amber-bg:#FAEEDA;--amber-txt:#633806;
  --pink-bg:#FBEAF0;--pink-txt:#72243E;
  --teal-bg:#E1F5EE;--teal-txt:#085041;
  --coral-bg:#FAECE7;--coral-txt:#712B13;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --radius:12px;--radius-sm:8px;
  font-size:16px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f0f1a;--surface:#1a1a2e;--border:#2a2a42;
    --text:#e8e8f5;--text2:#9898b5;--text3:#5a5a78;
    --purple-light:#26215C;--purple-mid:#3C3489;
  }
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--purple);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s ease}
#splash.hide{opacity:0;pointer-events:none}
.splash-icon{width:88px;height:88px;background:#EEEDFE;border-radius:24px;display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.splash-icon svg{width:48px;height:48px}
.splash-title{font-size:26px;font-weight:600;color:#fff;margin-bottom:8px;letter-spacing:-.3px}
.splash-sub{font-size:15px;color:#AFA9EC}
.splash-dots{display:flex;gap:8px;margin-top:40px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);animation:pulse 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* APP */
#app{min-height:100%;display:flex;flex-direction:column}

/* HEADER */
.header{background:var(--purple);padding:16px 20px 20px;color:#fff}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.header-logo{display:flex;align-items:center;gap:10px}
.header-icon{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center}
.header-name{font-size:17px;font-weight:600;letter-spacing:-.2px}
.month-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:13px;color:rgba(255,255,255,.9)}
.header-total{margin-top:16px}
.total-label{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:4px}
.total-value{font-size:36px;font-weight:700;letter-spacing:-1px;color:#fff}
.total-count{font-size:13px;color:rgba(255,255,255,.65);margin-top:4px}

/* SUMMARY PILLS */
.summary-row{display:flex;gap:8px;padding:16px 20px 0;overflow-x:auto;scrollbar-width:none}
.summary-row::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:8px 14px;display:flex;flex-direction:column;align-items:center;min-width:90px}
.pill-label{font-size:11px;color:var(--text2);margin-bottom:3px;white-space:nowrap}
.pill-value{font-size:14px;font-weight:600}

/* SECTIONS */
.sections{padding:16px 20px;display:flex;flex-direction:column;gap:12px;flex:1}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
.card-header-left{display:flex;align-items:center;gap:10px}
.cat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cat-name{font-size:15px;font-weight:500;color:var(--text)}
.cat-sub{font-size:12px;color:var(--text2);margin-top:1px}
.card-right{display:flex;align-items:center;gap:10px}
.cat-total{font-size:15px;font-weight:600;color:var(--text)}
.chevron{width:20px;height:20px;color:var(--text3);transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.card-body{border-top:0.5px solid var(--border);display:none}
.card-body.open{display:block}
.item-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:0.5px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-name{flex:1;font-size:14px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-val-wrap{display:flex;align-items:center;gap:6px}
.item-input{width:120px;text-align:right;font-size:14px;font-weight:500;color:var(--text);background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;outline:none}
.item-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(83,74,183,.15)}
.del-item-btn{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border);background:transparent;color:var(--text3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.del-item-btn:active{background:var(--red-bg);border-color:#F09595;color:var(--red)}
.add-item-row{display:flex;gap:8px;padding:10px 16px;border-top:0.5px solid var(--border)}
.add-item-input{flex:1;font-size:14px;padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;min-width:0}
.add-item-input:focus{border-color:var(--purple)}
.add-item-btn{padding:8px 14px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.add-item-btn:active{opacity:.85}

/* DEL SECTION */
.del-section-btn{font-size:11px;color:var(--text3);border:0.5px solid var(--border);background:transparent;border-radius:20px;padding:3px 10px;cursor:pointer;margin-bottom:8px;display:block;margin-left:16px}

/* NEW CATEGORY */
.new-cat-card{background:var(--surface);border:0.5px dashed var(--border);border-radius:var(--radius);padding:14px 16px}
.new-cat-label{font-size:13px;color:var(--text2);margin-bottom:10px}
.new-cat-row{display:flex;gap:8px}
.new-cat-input{flex:1;font-size:14px;padding:9px 12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;min-width:0}
.new-cat-input:focus{border-color:var(--purple)}
.new-cat-btn{padding:9px 16px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer}
.new-cat-btn:active{opacity:.85}

/* BOTTOM TOTAL BAR */
.total-bar{background:var(--surface);border-top:0.5px solid var(--border);padding:16px 20px;padding-bottom:calc(16px + env(safe-area-inset-bottom))}
.total-bar-inner{display:flex;align-items:center;justify-content:space-between}
.total-bar-label{font-size:14px;color:var(--text2)}
.total-bar-value{font-size:22px;font-weight:700;color:var(--red)}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-icon">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="12" width="36" height="26" rx="5" fill="#534AB7"/>
      <rect x="6" y="18" width="36" height="8" fill="#3C3489"/>
      <rect x="12" y="29" width="8" height="4" rx="2" fill="#AFA9EC"/>
      <rect x="24" y="29" width="5" height="4" rx="2" fill="#AFA9EC"/>
    </svg>
  </div>
  <div class="splash-title">Despesas Mensais</div>
  <div class="splash-sub">Controle seus gastos com facilidade</div>
  <div class="splash-dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="header-logo">
        <div class="header-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="15" rx="3" fill="white" fill-opacity=".9"/><rect x="2" y="9" width="20" height="5" fill="white" fill-opacity=".4"/><rect x="5" y="14" width="4" height="2" rx="1" fill="white" fill-opacity=".7"/></svg>
        </div>
        <div class="header-name">Despesas</div>
      </div>
      <div class="month-badge" id="month-badge"></div>
    </div>
    <div class="header-total">
      <div class="total-label">Total do mês</div>
      <div class="total-value" id="header-total">R$ 0,00</div>
      <div class="total-count" id="header-count">0 categorias · 0 itens</div>
    </div>
  </div>

  <div class="summary-row" id="summary-row"></div>

  <div class="sections" id="sections-container"></div>

  <div style="padding:0 20px 12px">
    <div class="new-cat-card">
      <div class="new-cat-label">+ Nova categoria de despesa</div>
      <div class="new-cat-row">
        <input class="new-cat-input" id="new-cat-input" placeholder="Ex: Saúde, Mercado, Escola..."/>
        <button class="new-cat-btn" onclick="addCategory()">Criar</button>
      </div>
    </div>
  </div>

  <div style="height:16px"></div>
</div>

<script>
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const ICONS = ['💳','🛍','🏦','🏠','❤️','🎓','🚗','💡','🛒','📦','🍔','📱'];
const COLORS = [
  {bg:'#E6F1FB',txt:'#0C447C'},{bg:'#EAF3DE',txt:'#27500A'},
  {bg:'#FAEEDA',txt:'#633806'},{bg:'#EEEDFE',txt:'#3C3489'},
  {bg:'#FBEAF0',txt:'#72243E'},{bg:'#E1F5EE',txt:'#085041'},
  {bg:'#FAECE7',txt:'#712B13'},{bg:'#F1EFE8',txt:'#444441'},
];

const STORE_KEY = 'despesas-data-v2';

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || defaultData(); } catch { return defaultData(); }
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function defaultData() {
  return {
    cats: [
      { id:'cards', name:'Cartões de crédito', icon:'💳', colorIdx:0, removable:false, items:[{id:1,name:'Nubank',value:0},{id:2,name:'Inter',value:0}], nextId:10 },
      { id:'store', name:'Prestações de loja', icon:'🛍', colorIdx:1, removable:false, items:[{id:1,name:'Magazine Luiza',value:0}], nextId:10 },
      { id:'loan',  name:'Empréstimos', icon:'🏦', colorIdx:2, removable:false, items:[{id:1,name:'Banco do Brasil',value:0}], nextId:10 },
    ],
    catNextId: 100
  };
}

let state = load();
const fmt = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtShort = v => v >= 1000 ? 'R$'+(v/1000).toFixed(1).replace('.',',')+' k' : 'R$'+Math.round(v).toLocaleString('pt-BR');
const getSub = cat => cat.items.reduce((s,i)=>s+i.value,0);
const getTotal = () => state.cats.reduce((s,c)=>s+getSub(c),0);
const getItemCount = () => state.cats.reduce((s,c)=>s+c.items.length,0);

function renderAll() {
  renderHeader();
  renderSummary();
  renderSections();
  save();
}

function renderHeader() {
  const now = new Date();
  document.getElementById('month-badge').textContent = MONTHS[now.getMonth()];
  document.getElementById('header-total').textContent = fmt(getTotal());
  document.getElementById('header-count').textContent = `${state.cats.length} categorias · ${getItemCount()} itens`;
}

function renderSummary() {
  const row = document.getElementById('summary-row');
  row.innerHTML = '';
  state.cats.forEach(cat => {
    const sub = getSub(cat);
    const c = COLORS[cat.colorIdx % COLORS.length];
    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.innerHTML = `<span class="pill-label">${cat.icon} ${cat.name.split(' ')[0]}</span><span class="pill-value" style="color:${c.txt}">${fmtShort(sub)}</span>`;
    row.appendChild(pill);
  });
}

function renderSections() {
  const container = document.getElementById('sections-container');
  const openStates = {};
  container.querySelectorAll('.card').forEach(card => {
    const id = card.dataset.catId;
    openStates[id] = card.querySelector('.card-body')?.classList.contains('open');
  });
  container.innerHTML = '';
  state.cats.forEach(cat => {
    container.appendChild(buildCard(cat, openStates[cat.id]));
  });
}

function buildCard(cat, isOpen) {
  const c = COLORS[cat.colorIdx % COLORS.length];
  const sub = getSub(cat);
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.catId = cat.id;

  const itemsHtml = cat.items.map(item => `
    <div class="item-row">
      <button class="del-item-btn" onclick="removeItem('${cat.id}',${item.id})">×</button>
      <span class="item-name">${item.name}</span>
      <div class="item-val-wrap">
        <input class="item-input" type="text" inputmode="decimal" placeholder="R$ 0,00"
          value="${item.value > 0 ? fmt(item.value) : ''}"
          data-cat="${cat.id}" data-id="${item.id}"
          onfocus="this.select()" oninput="onInput(this)" onblur="onBlur(this)"/>
      </div>
    </div>
  `).join('');

  const delSection = cat.removable ? `<button class="del-section-btn" onclick="removeCategory('${cat.id}')">Remover categoria</button>` : '';

  card.innerHTML = `
    <div class="card-header" onclick="toggleCard('${cat.id}')">
      <div class="card-header-left">
        <div class="cat-icon" style="background:${c.bg}">${cat.icon}</div>
        <div>
          <div class="cat-name">${cat.name}</div>
          <div class="cat-sub">${cat.items.length} ${cat.items.length===1?'item':'itens'}</div>
        </div>
      </div>
      <div class="card-right">
        <span class="cat-total">${fmt(sub)}</span>
        <svg class="chevron ${isOpen?'open':''}" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/></svg>
      </div>
    </div>
    <div class="card-body ${isOpen?'open':''}">
      ${delSection}
      <div id="items-${cat.id}">${itemsHtml}</div>
      <div class="add-item-row">
        <input class="add-item-input" id="new-item-${cat.id}" placeholder="Nome do item..." />
        <button class="add-item-btn" onclick="addItem('${cat.id}')">+ Adicionar</button>
      </div>
    </div>
  `;

  card.querySelector(`#new-item-${cat.id}`)?.addEventListener('keydown', e => { if(e.key==='Enter') addItem(cat.id); });
  return card;
}

function toggleCard(catId) {
  const card = document.querySelector(`[data-cat-id="${catId}"]`);
  const body = card.querySelector('.card-body');
  const chev = card.querySelector('.chevron');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function onInput(el) { el.value = el.value.replace(/[^\d]/g,''); }
function onBlur(el) {
  const cat = state.cats.find(c=>c.id===el.dataset.cat);
  const item = cat.items.find(i=>i.id===parseInt(el.dataset.id));
  const raw = el.value.replace(/[^\d]/g,'');
  item.value = raw ? parseInt(raw)/100 : 0;
  el.value = item.value > 0 ? fmt(item.value) : '';
  renderHeader();
  renderSummary();
  const catCard = document.querySelector(`[data-cat-id="${cat.id}"]`);
  if(catCard) catCard.querySelector('.cat-total').textContent = fmt(getSub(cat));
  save();
}

function addItem(catId) {
  const inp = document.getElementById('new-item-'+catId);
  const name = inp.value.trim();
  if(!name){inp.focus();return;}
  const cat = state.cats.find(c=>c.id===catId);
  cat.items.push({id:cat.nextId++,name,value:0});
  inp.value='';
  renderAll();
  setTimeout(()=>{
    const inputs = document.querySelectorAll(`[data-cat="${catId}"]`);
    if(inputs.length) inputs[inputs.length-1].focus();
  },80);
}

function removeItem(catId, itemId) {
  const cat = state.cats.find(c=>c.id===catId);
  cat.items = cat.items.filter(i=>i.id!==itemId);
  renderAll();
}

function addCategory() {
  const inp = document.getElementById('new-cat-input');
  const name = inp.value.trim();
  if(!name){inp.focus();return;}
  const colorIdx = state.cats.length % COLORS.length;
  const iconIdx = state.cats.length % ICONS.length;
  state.cats.push({
    id:'cat_'+state.catNextId++, name, icon:ICONS[iconIdx],
    colorIdx, removable:true, items:[], nextId:1
  });
  inp.value='';
  renderAll();
}

function removeCategory(catId) {
  state.cats = state.cats.filter(c=>c.id!==catId);
  renderAll();
}

document.getElementById('new-cat-input').addEventListener('keydown',e=>{if(e.key==='Enter')addCategory();});

// SPLASH
setTimeout(()=>{
  document.getElementById('splash').classList.add('hide');
  setTimeout(()=>document.getElementById('splash').remove(),600);
},1800);

// SERVICE WORKER
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
}

renderAll();
</script>
</body>
</html>
